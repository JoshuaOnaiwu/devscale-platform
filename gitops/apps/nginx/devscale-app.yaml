apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devscale-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/JoshuaOnaiwu/end-to-end-node-ci-cd.git
    targetRevision: main
    path: app/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true