apiVersion: apps/v1
kind: Deployment
metadata:
  name: devscale-node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devscale-node-app
  template:
    metadata:
      labels:
        app: devscale-node-app
    spec:
      containers:
      - name: node-app
        image: 808850079759.dkr.ecr.us-east-1.amazonaws.com/devscale-node-app:latest
        ports:
        - containerPort: 3000