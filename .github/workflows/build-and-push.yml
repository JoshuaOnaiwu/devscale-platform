name: DevScale CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t devscale-node-app ./app/node-app

      - name: Tag Docker image
        run: |
          docker tag devscale-node-app:latest 808850079759.dkr.ecr.us-east-1.amazonaws.com/devscale-node-app:latest

      - name: Push Docker image
        run: |
          docker push 808850079759.dkr.ecr.us-east-1.amazonaws.com/devscale-node-app:latest